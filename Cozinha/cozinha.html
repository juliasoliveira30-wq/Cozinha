<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pedidos - Urban Burguer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .novo-pedido-alerta {
            animation: pulse-border 2s infinite;
        }
    </style>
</head>
<body class="bg-red-50/30 h-screen flex overflow-hidden text-slate-800">

    <aside class="w-20 md:w-64 bg-white border-r border-red-100 flex flex-col justify-between shadow-sm z-20">
        <div>
            <div class="h-20 flex items-center justify-center md:justify-start md:px-6 border-b border-red-100 bg-orange-600 text-white">
                <span class="text-3xl">đźŤ”</span>
                <span class="hidden md:block ml-3 font-black text-xl tracking-wide">Urban Burguer</span>
            </div>
            
            <nav class="p-4 space-y-2">
                <a href="#" class="flex items-center p-3 text-orange-600 bg-orange-50 rounded-xl font-bold transition">
                    <span class="text-xl">đź“‹</span>
                    <span class="hidden md:block ml-3">Pedidos do App</span>
                </a>
                <a href="#" class="flex items-center p-3 text-slate-500 hover:bg-slate-50 rounded-xl font-bold transition">
                    <span class="text-xl">đźŤ˝ď¸Ź</span>
                    <span class="hidden md:block ml-3">CardĂˇpio</span>
                </a>
                <a href="#" class="flex items-center p-3 text-slate-500 hover:bg-slate-50 rounded-xl font-bold transition">
                    <span class="text-xl">âš™ď¸Ź</span>
                    <span class="hidden md:block ml-3">ConfiguraĂ§Ăµes</span>
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-red-100">
            <div class="flex items-center justify-center md:justify-start gap-3">
                <div class="relative">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-xl">đź‘¨â€ŤđźŤł</div>
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                </div>
                <div class="hidden md:block">
                    <p class="text-sm font-bold">Loja Aberta</p>
                    <p class="text-xs text-slate-500" id="relogio">--:--</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-red-100 px-6 flex items-center justify-between z-10">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-800">GestĂŁo de Retiradas</h1>
                <p class="text-sm font-semibold text-slate-500">Acompanhe os pedidos do seu aplicativo</p>
            </div>
            <div class="flex gap-2 bg-slate-100 p-1 rounded-xl">
                <button onclick="filtrar('todos')" id="btn-todos" class="px-4 py-2 rounded-lg text-sm font-bold bg-white text-orange-600 shadow-sm transition">Todos</button>
                <button onclick="filtrar('retirada')" id="btn-retirada" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-800 transition">Apenas Retirada</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-5xl mx-auto space-y-8">

                <section id="secao-novos">
                    <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2 mb-4">
                        <span class="w-2 h-2 rounded-full bg-red-500 animate-ping"></span> 
                        Novos Pedidos
                    </h2>
                    <div id="lista-novos" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </section>

                <section>
                    <h2 class="text-lg font-bold text-slate-700 mb-4 border-b border-red-200 pb-2">Acompanhamento</h2>
                    <div id="lista-andamento" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        </div>
                </section>

            </div>
        </div>
    </main>

    <script>
        let pedidos = [
            { 
                id: '1099', 
                cliente: 'Carlos Mendes', 
                app: 'Seu App PrĂłprio',
                itens: ['2x Cheeseburger', '1x Extra Fries'], 
                tipo: 'Retirada no BalcĂŁo', 
                total: 'R$ 65,00', 
                tempo: 'HĂˇ 2 min', 
                status: 'novo' 
            },
            { 
                id: '1100', 
                cliente: 'Mariana Lima', 
                app: 'Seu App PrĂłprio',
                itens: ['1x Burger Combo', '1x Coca-Cola Lata'], 
                tipo: 'Delivery', 
                total: 'R$ 48,90', 
                tempo: 'HĂˇ 5 min', 
                status: 'novo' 
            },
            { 
                id: '1095', 
                cliente: 'Fernando Silva', 
                app: 'Seu App PrĂłprio',
                itens: ['1x Family Fries', '2x Cerveja'], 
                tipo: 'Retirada no BalcĂŁo', 
                total: 'R$ 110,00', 
                tempo: 'Preparo: 15 min', 
                status: 'preparando' 
            },
            { 
                id: '1090', 
                cliente: 'Juliana Costa', 
                app: 'Seu App PrĂłprio',
                itens: ['2x Cheese Fries'], 
                tipo: 'Retirada no BalcĂŁo', 
                total: 'R$ 55,00', 
                tempo: 'Aguardando Cliente', 
                status: 'pronto' 
            }
        ];

        let filtroAtual = 'todos';

        function renderizarPedidos() {
            const listaNovos = document.getElementById('lista-novos');
            const listaAndamento = document.getElementById('lista-andamento');
            const secaoNovos = document.getElementById('secao-novos');

            listaNovos.innerHTML = '';
            listaAndamento.innerHTML = '';

            let temNovos = false;

            pedidos.forEach(pedido => {
                if (filtroAtual === 'retirada' && pedido.tipo !== 'Retirada no BalcĂŁo') return;

                if (pedido.status === 'novo') {
                    listaNovos.innerHTML += criarCardNovo(pedido);
                    temNovos = true;
                } else {
                    listaAndamento.innerHTML += criarCardAcompanhamento(pedido);
                }
            });

            secaoNovos.style.display = temNovos ? 'block' : 'none';
        }

        function criarCardNovo(pedido) {
            const itensLista = pedido.itens.map(item => `<div class="text-sm font-semibold text-slate-600 mt-1">${item}</div>`).join('');
            const icon = pedido.tipo.includes('Retirada') ? 'đźš¶â€Ťâ™‚ď¸Ź' : 'đź›µ';

            return `
                <div class="bg-white rounded-3xl p-5 border-2 border-red-500 novo-pedido-alerta shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-red-500 text-white text-xs font-black px-4 py-1 rounded-bl-xl">NOVO</div>
                    
                    <div class="flex justify-between items-start mb-3 mt-2">
                        <div>
                            <h3 class="text-2xl font-black text-slate-800">#${pedido.id}</h3>
                            <p class="text-sm text-slate-500 font-bold">${pedido.cliente}</p>
                        </div>
                        <div class="text-right">
                            <span class="inline-block bg-red-100 text-red-700 font-bold text-xs px-2 py-1 rounded-lg">${icon} ${pedido.tipo}</span>
                            <p class="text-xs text-slate-400 mt-1 font-bold">${pedido.tempo}</p>
                        </div>
                    </div>

                    <div class="bg-slate-50 rounded-xl p-3 mb-4">
                        ${itensLista}
                    </div>

                    <div class="flex gap-3">
                        <button onclick="mudarStatus('${pedido.id}', 'preparando')" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-black text-lg shadow-sm transition">
                            ACEITAR PEDIDO
                        </button>
                    </div>
                </div>
            `;
        }

        function criarCardAcompanhamento(pedido) {
            const isPronto = pedido.status === 'pronto';
            const bgCor = isPronto ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-200';
            const badgeCor = isPronto ? 'bg-emerald-500 text-white' : 'bg-amber-400 text-amber-900';
            const badgeTexto = isPronto ? 'âś… Pronto para Retirada' : 'đź”Ą Na Cozinha';
            const icon = pedido.tipo.includes('Retirada') ? 'đźš¶â€Ťâ™‚ď¸Ź' : 'đź›µ';

            let botaoAcao = '';
            if (!isPronto) {
                botaoAcao = `<button onclick="mudarStatus('${pedido.id}', 'pronto')" class="w-full mt-4 bg-slate-800 hover:bg-slate-900 text-white py-2 rounded-xl font-bold transition">Marcar como Pronto</button>`;
            } else {
                botaoAcao = `<button onclick="finalizarPedido('${pedido.id}')" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-xl font-bold transition">Pedido Entregue</button>`;
            }

            return `
                <div class="${bgCor} border rounded-3xl p-5 shadow-sm transition-all hover:shadow-md">
                    <div class="flex justify-between items-center mb-3">
                        <span class="${badgeCor} text-xs font-black px-3 py-1 rounded-full">${badgeTexto}</span>
                        <span class="text-slate-400 text-sm font-bold">#${pedido.id}</span>
                    </div>
                    
                    <h4 class="font-black text-lg text-slate-800">${pedido.cliente}</h4>
                    <p class="text-xs font-bold text-slate-500 mb-3">${icon} ${pedido.tipo}</p>

                    <div class="space-y-1 mb-2">
                        ${pedido.itens.map(i => `<p class="text-sm text-slate-600 truncate">ďż˝ ${i}</p>`).join('')}
                    </div>

                    ${botaoAcao}
                </div>
            `;
        }

        function mudarStatus(id, novoStatus) {
            const index = pedidos.findIndex(p => p.id === id);
            if (index !== -1) { 
                pedidos[index].status = novoStatus; 
                renderizarPedidos(); 
            }
        }

        function finalizarPedido(id) {
            pedidos = pedidos.filter(p => p.id !== id);
            renderizarPedidos();
        }

        function filtrar(tipo) {
            filtroAtual = tipo;
            document.getElementById('btn-todos').className = tipo === 'todos' ? 'px-4 py-2 rounded-lg text-sm font-bold bg-white text-orange-600 shadow-sm transition' : 'px-4 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-800 transition';
            document.getElementById('btn-retirada').className = tipo === 'retirada' ? 'px-4 py-2 rounded-lg text-sm font-bold bg-white text-orange-600 shadow-sm transition' : 'px-4 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-800 transition';
            renderizarPedidos();
        }

        function atualizarRelogio() {
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const min = String(agora.getMinutes()).padStart(2, '0');
            document.getElementById('relogio').innerText = `${horas}:${min}`;
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        renderizarPedidos();
    </script>
</body>
</html>
